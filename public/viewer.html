<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trình chiếu</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        #container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        .media { position: absolute; max-width: 100%; max-height: 100%; object-fit: contain; opacity: 0; }
        
        /* Hiệu ứng chuyển cảnh */
        .fade { transition: opacity 1s ease-in-out; }
        .none { transition: none; }
        .active { opacity: 1 !important; z-index: 10; }
    </style>
</head>
<body>
    <div id="container"></div>

    <script>
        let config = {};
        let currentIndex = -1;
        let container = document.getElementById('container');
        let currentElement = null;

        async function fetchConfigAndPlay() {
            const res = await fetch('/config');
            config = await res.json();
            
            if(config.playlist.length === 0) {
                setTimeout(fetchConfigAndPlay, 5000); // Thử lại nếu chưa có list
                return;
            }
            playNext();
        }

        function playNext() {
            // Mỗi vòng lặp kết thúc, fetch lại config để cập nhật realtime
            if (currentIndex >= config.playlist.length - 1) {
                currentIndex = -1;
                fetchConfigAndPlay(); 
                return;
            }
            
            currentIndex++;
            const fileName = config.playlist[currentIndex];
            const isVideo = fileName.match(/\.(mp4|webm|ogg)$/i);
            const mediaUrl = `/uploads/${fileName}`;

            // Xóa media cũ
            if (currentElement) {
                currentElement.classList.remove('active');
                setTimeout((el) => el.remove(), 1000, currentElement);
            }

            // Tạo media mới
            if (isVideo) {
                currentElement = document.createElement('video');
                currentElement.src = mediaUrl;
                currentElement.autoplay = true;
                currentElement.muted = false; // Chỉnh true nếu muốn video im lặng
                
                // CỐT LÕI: Đợi hết video mới chuyển
                currentElement.onended = () => { playNext(); };
                // Đề phòng lỗi play
                currentElement.onerror = () => { playNext(); };
            } else {
                currentElement = document.createElement('img');
                currentElement.src = mediaUrl;
                
                // Đợi thời gian duration mới chuyển
                setTimeout(() => { playNext(); }, config.duration * 1000);
            }

            currentElement.className = `media ${config.transition}`;
            container.appendChild(currentElement);
            
            // Trigger reflow để kích hoạt CSS transition
            void currentElement.offsetWidth;
            currentElement.classList.add('active');
            
            if (isVideo) {
                currentElement.play().catch(e => {
                    console.log("Autoplay bị chặn, bỏ qua video này", e);
                    playNext();
                });
            }
        }

        // Bắt đầu trình chiếu
        fetchConfigAndPlay();
    </script>
</body>
</html>
